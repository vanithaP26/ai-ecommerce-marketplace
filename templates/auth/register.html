{% extends 'layouts/base.html' %}
{% block title %}Register | Nexus Market{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-panel p-5 rounded-4 shadow-lg border-0 bg-white">
                <div class="text-center mb-4">
                    <h2 class="fw-bold mb-1">Create Account</h2>
                    <p class="text-muted">Join our intelligent marketplace ecosystem</p>
                </div>
                
                <form action="{{ url_for('auth.register') }}" method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="username" class="form-label fw-semibold">Username</label>
                            <input type="text" class="form-control bg-light border-0 py-2" id="username" name="username" required placeholder="e.g. johndoe">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label fw-semibold">Email Address</label>
                            <input type="email" class="form-control bg-light border-0 py-2" id="email" name="email" required placeholder="name@example.com">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <input type="password" class="form-control bg-light border-0 py-2" id="password" name="password" required placeholder="Min 6 characters">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold d-block">Account Type</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="role" id="role_customer" value="customer" checked>
                            <label class="form-check-label fw-medium" for="role_customer">Customer (Buy Products)</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="role" id="role_vendor" value="vendor">
                            <label class="form-check-label fw-medium" for="role_vendor">Vendor (Sell Products)</label>
                        </div>
                    </div>
                    
                    <!-- Dynamic Vendor Fields -->
                    <div id="vendor-fields" style="display: none;" class="p-3 border rounded-3 mb-4 bg-light">
                        <h5 class="fw-semibold text-primary mb-3">Vendor Credentials</h5>
                        <div class="mb-3">
                            <label for="business_name" class="form-label fw-semibold">Business Name *</label>
                            <input type="text" class="form-control bg-white border-1" id="business_name" name="business_name" placeholder="e.g. Gizmo Store">
                        </div>
                        <div class="mb-0">
                            <label for="description" class="form-label fw-semibold">Business Description</label>
                            <textarea class="form-control bg-white border-1" id="description" name="description" rows="3" placeholder="Tell customers about your brand..."></textarea>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-premium w-100 py-2 mb-3">Create Account</button>
                </form>
                
                <div class="text-center mt-2">
                    <p class="small mb-0 text-muted">Already registered? <a href="{{ url_for('auth.login') }}" class="fw-semibold text-primary">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const customerRadio = document.getElementById('role_customer');
        const vendorRadio = document.getElementById('role_vendor');
        const vendorFields = document.getElementById('vendor-fields');
        const businessInput = document.getElementById('business_name');
        
        function toggleVendorFields() {
            if (vendorRadio.checked) {
                vendorFields.style.display = 'block';
                businessInput.required = true;
            } else {
                vendorFields.style.display = 'none';
                businessInput.required = false;
            }
        }
        
        customerRadio.addEventListener('change', toggleVendorFields);
        vendorRadio.addEventListener('change', toggleVendorFields);
    });
</script>
{% endblock %}
