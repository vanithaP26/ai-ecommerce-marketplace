{% extends 'layouts/base.html' %}
{% block title %}Login | Nexus Market{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="glass-panel p-5 rounded-4 shadow-lg border-0 bg-white">
                <div class="text-center mb-4">
                    <h2 class="fw-bold mb-1">Welcome Back</h2>
                    <p class="text-muted">Enter credentials to access your account</p>
                </div>
                
                <form action="{{ url_for('auth.login') }}" method="POST">
                    <div class="mb-3">
                        <label for="login_input" class="form-label fw-semibold">Email or Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="fa-regular fa-envelope text-secondary"></i></span>
                            <input type="text" class="form-control bg-light border-0 py-2" id="login_input" name="login_input" required placeholder="name@example.com or username">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <div class="d-flex justify-content-between">
                            <label for="password" class="form-label fw-semibold">Password</label>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="fa-solid fa-lock text-secondary"></i></span>
                            <input type="password" class="form-control bg-light border-0 py-2" id="password" name="password" required placeholder="Enter password">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-premium w-100 py-2 mb-3">Sign In</button>
                </form>
                
                <div class="text-center mt-3">
                    <p class="small mb-0 text-muted">Don't have an account? <a href="{{ url_for('auth.register') }}" class="fw-semibold text-primary">Sign up here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
