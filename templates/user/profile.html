{% extends 'layouts/base.html' %}
{% block title %}My Profile | Nexus Market{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card border-0 shadow-sm rounded-4 p-5 bg-white">
                <h3 class="fw-bold mb-4" style="font-family: var(--font-heading);"><i class="fa-regular fa-user-circle text-indigo-600 me-2"></i> Account Settings</h3>
                
                <form action="{{ url_for('user.profile') }}" method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <input type="text" class="form-control bg-light border-0 py-2" id="username" name="username" value="{{ user.username }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">Email Address</label>
                        <input type="email" class="form-control bg-light border-0 py-2" id="email" name="email" value="{{ user.email }}" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Account Role</label>
                        <input type="text" class="form-control bg-light border-0 py-2 text-capitalize fw-bold text-indigo-600" value="{{ user.role }}" readonly>
                        <div class="form-text">Account roles are configured at sign up and cannot be modified.</div>
                    </div>
                    
                    <button type="submit" class="btn btn-premium px-4 py-2">Update Account</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
