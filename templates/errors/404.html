{% extends 'layouts/base.html' %}
{% block title %}Page Not Found | Nexus Market{% endblock %}

{% block content %}
<div class="container my-5 text-center">
    <div class="error-container">
        <h1 class="error-title">404</h1>
        <h2 class="fw-bold mb-3">Oops! Page Not Found</h2>
        <p class="text-muted mb-4 fs-5">We can't find the page you're looking for. It might have been moved or doesn't exist.</p>
        <a href="{{ url_for('user.index') }}" class="btn btn-premium px-4 py-2">
            <i class="fas fa-home me-2"></i> Return to Homepage
        </a>
    </div>
</div>
{% endblock %}
